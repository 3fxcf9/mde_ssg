<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>{{ title }}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="{{ http_root }}styles/common.css" />
  <link rel="stylesheet" href="{{ http_root }}styles/document.css" />
  <link rel="stylesheet" href="{{ http_root }}styles/table_of_contents.css" />
  <link rel="stylesheet" href="{{ http_root }}styles/figure_zoom.css" />

  <link rel="stylesheet" href="{{ http_root }}katex/katex.min.css"/>
  <link href="{{ http_root }}fonts/computer-modern/fonts/serif.css" rel="stylesheet">
  <link href="{{ http_root }}fonts/computer-modern/fonts/sans.css" rel="stylesheet">
  <link rel="preload" href="{{ http_root }}fonts/inter/InterVariable.ttf" as="font" type="font/ttf">
</head>

<body>
  <div class="menu-toggle">
    <svg class="icon-menu" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-menu"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>

    <svg class="icon-close" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-x"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
  </div>

  <aside class="left">
    {% if back_url %}
    <div class="back">
      <a href="{{ http_root }}{{ back_url }}" class="back-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="feather feather-arrow-left">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg> {{ back_label }}
      </a>
    </div>
    {% endif %}

    <nav class="toc-wrapper">
      {{ toc_html | safe }}
    </nav>
  </aside>

  <main class="right">{{ html | safe }}</main>

  <script defer src="{{ http_root }}katex/katex.min.js"></script>
  <script src="{{ http_root }}js/math_rendering.js"></script>

  <script src="{{ http_root }}js/table_of_contents.js"></script>

  <script src="{{ http_root }}js/figure_zoom.js"></script>

  <script>
    const menuElement = document.querySelector(".left");
    const menuToggleElement = document.querySelector(".menu-toggle");

    function toggleMenuVisibility(force) {
        const shouldOpen = typeof force === "boolean" ? force : !menuElement.classList.contains("opened");

        menuElement.classList.toggle("opened", shouldOpen);
        menuToggleElement.classList.toggle("opened", shouldOpen);
    }

    menuToggleElement.addEventListener("click", toggleMenuVisibility);

    document.querySelectorAll("nav a").forEach(link => {
        link.addEventListener("click", () => toggleMenuVisibility(false));
    });
  </script>

  <script>
    window.addEventListener("beforeprint", (event) => {
      for (const detailEl of document.querySelectorAll("details")) {
        if (detailEl.getAttribute("open") == null) {
          detailEl.setAttribute("data-was-closed", "true");
        }
        detailEl.setAttribute("open", "");
      }
    });

    window.addEventListener("afterprint", (event) => {
      for (const detailEl of document.querySelectorAll("details")) {
        if (detailEl.getAttribute("data-was-closed") != null) {
          detailEl.removeAttribute("data-was-closed");
          detailEl.removeAttribute("open");
        }
      }
    });
  </script>
</body>

</html>
